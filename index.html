<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL_ASSET | The Void Protocol</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root { --c: #00ff41; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--c); 
            font-family: 'Courier New', monospace; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        #app { 
            border: 1px solid var(--c); 
            padding: 40px; 
            max-width: 600px; 
            background: rgba(0,0,0,0.9); 
            box-shadow: 0 0 30px rgba(0,255,65,0.3); 
            text-align: center; 
            margin: 20px; 
        }
        h1 { 
            font-size: 2.5em; 
            letter-spacing: 8px; 
            border-bottom: 1px solid var(--c); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
        }
        .manifesto { 
            text-align: left; 
            font-size: 0.9em; 
            line-height: 1.6; 
            border-left: 3px solid var(--c); 
            padding-left: 25px; 
            margin: 30px 0; 
            color: #a0ffa0; 
        }
        input { 
            background: transparent; 
            border: 2px solid var(--c); 
            color: var(--c); 
            padding: 15px; 
            width: 140px; 
            font-size: 1.4em; 
            text-align: center; 
            margin: 20px 10px; 
        }
        button { 
            background: var(--c); 
            color: #000; 
            border: none; 
            padding: 18px 50px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 1.1em; 
            transition: all 0.3s; 
            font-family: inherit; 
            margin: 10px; 
            border-radius: 5px;
        }
        button:hover:not(:disabled) { 
            background: #000; 
            color: var(--c); 
            box-shadow: 0 0 20px var(--c); 
        }
        button:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }
        #status { 
            margin: 20px 0; 
            font-size: 0.85em; 
            min-height: 25px; 
            word-break: break-all; 
            padding: 10px; 
            background: rgba(0,255,65,0.1); 
            border: 1px solid rgba(0,255,65,0.2);
            border-radius: 5px;
        }
        .langs { 
            margin-top: 30px; 
            font-size: 0.8em; 
        }
        .langs span { 
            cursor: pointer; 
            margin: 0 8px; 
            padding: 8px 12px; 
            border: 1px solid var(--c); 
            border-radius: 5px; 
            transition: 0.2s; 
            display: inline-block;
        }
        .langs span:hover, .langs span.active { 
            background: var(--c); 
            color: #000; 
        }
        @keyframes pulse { 
            0%,100%{opacity:.6} 
            50%{opacity:1} 
        }
        .pulse { animation: pulse 1.5s infinite; }
        .wallet-info { font-size: 0.7em; color: #a0ffa0; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <h1 id="title">NULL_ASSET</h1>
        
        <div class="manifesto" id="text"></div>
        
        <div>
            <input type="number" id="sol" value="3.69" min="0.1" step="0.01" disabled>
            <div style="font-size:1.4em;margin:20px 0">SOL</div>
            <br>
            
            <div>
                <button id="connect" onclick="connectWallet()">🔗 CONNECT WALLET</button>
                <button id="burn" onclick="burn()" disabled>🔥 SACRIFICE</button>
            </div>
        </div>
        
        <div id="status">Click CONNECT WALLET</div>
        <div id="wallet-info" class="wallet-info" style="display:none;"></div>
        
        <div class="langs">
            <span onclick="setLang('en')" class="active">EN</span>
            <span onclick="setLang('ua')">UA</span>
            <span onclick="setLang('ru')">RU</span>
            <span onclick="setLang('de')">DE</span>
            <span onclick="setLang('pl')">PL</span>
        </div>
    </div>

<script>
const ADDR = "5T3ynidN1S4sHGTWF3RQ6NVTFgvMznkVJjZBfvcQPnrC";
const BURN = "11111111111111111111111111111111";
let wallet = null;
let publicKey = null;

const LANG = {
    en: { 
        t:"NULL_ASSET", 
        connect:"🔗 CONNECT WALLET",
        burn:"🔥 INITIATE SACRIFICE",
        status:"Click CONNECT WALLET",
        m:"Money is noise. Void is signal. 66.6% BURN FOREVER. 33.3% protocol.",
        connected:"✅ Wallet connected"
    },
    ua: { 
        t:"NULL_ASSET", 
        connect:"🔗 ПІДКЛЮЧИТИ ГАМАНЕЦЬ",
        burn:"🔥 ПРИНЕСТИ ЖЕРТВУ",
        status:"Натисни ПІДКЛЮЧИТИ ГАМАНЕЦЬ",
        m:"Гроші — шум. Пустота — сигнал. 66.6% СПАЛЮЄТЬСЯ НАЗАВЖДИ. 33.3% протокол.",
        connected:"✅ Гаманець підключено"
    },
    ru: { 
        t:"NULL_ASSET", 
        connect:"🔗 ПОДКЛЮЧИТЬ КОШЕЛЕК",
        burn:"🔥 ПРИНЕСТИ ЖЕРТВУ",
        status:"Нажми ПОДКЛЮЧИТЬ КОШЕЛЕК",
        m:"Деньги — шум. Пустота — сигнал. 66.6% СЖИГАЕТСЯ НАВСЕГДА. 33.3% протокол.",
        connected:"✅ Кошелек подключен"
    },
    de: { 
        t:"NULL_ASSET", 
        connect:"🔗 WALLET VERBINDEN",
        burn:"🔥 OPFER BRINGEN",
        status:"Klicke WALLET VERBINDEN",
        m:"Geld ist Lärm. Leere ist Signal. 66.6% VERBRENNT FÜR IMMER.",
        connected:"✅ Wallet verbunden"
    },
    pl: { 
        t:"NULL_ASSET", 
        connect:"🔗 POŁĄCZ PORTFEL",
        burn:"🔥 ZŁÓŻ OFIARĘ",
        status:"Kliknij POŁĄCZ PORTFEL",
        m:"Pieniądze to hałas. Pustka to sygnał. 66.6% SPALONE NA ZAWSZE.",
        connected:"✅ Portfel połączony"
    }
};

let currentLang = 'en';

function setLang(l) {
    currentLang = l;
    const t = LANG[l];
    
    // Update UI
    document.getElementById('title').textContent = t.t;
    document.getElementById('connect').textContent = t.connect;
    document.getElementById('burn').textContent = t.burn;
    document.getElementById('text').textContent = t.m;
    
    // Update lang buttons
    document.querySelectorAll('.langs span').forEach(span => span.classList.remove('active'));
    event.target.classList.add('active');
    
    // Update status if needed
    updateStatus();
}

function updateStatus(msg = null) {
    const t = LANG[currentLang];
    const status = document.getElementById('status');
    status.textContent = msg || (wallet ? t.connected : t.status);
    status.classList.toggle('pulse', !wallet);
}

async function connectWallet() {
    const status = document.getElementById('status');
    const connectBtn = document.getElementById('connect');
    const burnBtn = document.getElementById('burn');
    const solInput = document.getElementById('sol');
    
    try {
        wallet = window.phantom?.solana || window.solana || window.solflare;
        if (!wallet) throw new Error("No wallet found. Install Phantom/Solflare");
        
        status.textContent = "Connecting...";
        status.classList.add('pulse');
        
        await wallet.connect();
        publicKey = wallet.publicKey.toString();
        
        // Update UI
        connectBtn.textContent = "✅ CONNECTED";
        connectBtn.disabled = true;
        burnBtn.disabled = false;
        solInput.disabled = false;
        document.getElementById('wallet-info').textContent = `${publicKey.slice(0,8)}...${publicKey.slice(-8)}`;
        document.getElementById('wallet-info').style.display = 'block';
        
        updateStatus();
        status.classList.remove('pulse');
        
    } catch(e) {
        status.textContent = `Error: ${e.message}`;
        console.error(e);
    }
}

async function burn() {
    if (!wallet || !publicKey) return;
    
    const status = document.getElementById('status');
    const burnBtn = document.getElementById('burn');
    const sol = parseFloat(document.getElementById('sol').value);
    
    if (sol < 0.1) {
        status.textContent = "❌ Minimum 0.1 SOL";
        return;
    }
    
    try {
        burnBtn.disabled = true;
        status.textContent = "Creating transaction...";
        status.classList.add('pulse');
        
        const conn = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));
        const lamports = Math.floor(sol * solanaWeb3.LAMPORTS_PER_SOL);
        const burnAmt = Math.floor(lamports * 0.666);
        const opAmt = lamports - burnAmt;
        
        const tx = new solanaWeb3.Transaction().add(
            solanaWeb3.SystemProgram.transfer({
                fromPubkey: new solanaWeb3.PublicKey(publicKey),
                toPubkey: new solanaWeb3.PublicKey(BURN),
                lamports: burnAmt
            }),
            solanaWeb3.SystemProgram.transfer({
                fromPubkey: new solanaWeb3.PublicKey(publicKey),
                toPubkey: new solanaWeb3.PublicKey(ADDR),
                lamports: opAmt
            })
        );
        
        const { blockhash } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = new solanaWeb3.PublicKey(publicKey);
        
        status.textContent = "Sign & send...";
        const { signature } = await wallet.signAndSendTransaction(tx);
        
        status.textContent = `✅ SUCCESS: ${signature.slice(0,16)}...`;
        status.classList.remove('pulse');
        burnBtn.disabled = false;
        
        window.open(`https://solscan.io/tx/${signature}`, '_blank');
        
    } catch(e) {
        status.textContent = `❌ ${e.message}`;
        status.classList.remove('pulse');
        burnBtn.disabled = false;
        console.error(e);
    }
}

// Init
setLang(currentLang);
updateStatus();
</script>
</body>
</html>
