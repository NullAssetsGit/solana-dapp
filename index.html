<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Wallet</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body { 
      margin: 0; 
      padding: 20px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      font-size: 2.5em;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    button {
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      background: linear-gradient(45deg, #00d4aa, #00b894);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,212,170,0.4);
      transition: all 0.3s ease;
      min-width: 200px;
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0,212,170,0.6);
    }
    button:active {
      transform: translateY(-1px);
    }
    #status {
      font-size: 1.2em;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪙 Solana Test</h1>
    <button id="connect">Connect Wallet</button>
    <div id="status">Ready... 🚀</div>
  </div>

  <script type="module">
    
    import { Connection, PublicKey } from 'https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js';
    
    const status = document.getElementById('status');
    const connectBtn = document.getElementById('connect');
    
    // Тест подключения
    const connection = new Connection('https://api.mainnet-beta.solana.com');
    
    status.textContent = 'Solana Web3.js ✅ Loaded!';
    console.log('✅ Solana Web3.js loadeed');
    
    connectBtn.onclick = async () => {
      connectBtn.disabled = true;
      connectBtn.textContent = 'Checking...';
      
      try {
        status.textContent = '🔄 Connecting to RPC...';
        
       
        const version = await connection.getVersion();
        
       
        const balance = await connection.getBalance(new PublicKey('11111111111111111111111111111112'));
        
        status.innerHTML = `
          ✅ RPC v${version['feature-set']}<br>
          💰 System balance: ${(balance/1e9).toFixed(2)} SOL
        `;
        
        console.log('✅ RPC working!', version, balance);
      } catch (error) {
        status.textContent = `❌ Error: ${error.message}`;
        console.error('❌ RPC ERR:', error);
      } finally {
        connectBtn.disabled = false;
        connectBtn.textContent = 'Connect Wallet';
      }
    };
  </script>
</body>
</html>
