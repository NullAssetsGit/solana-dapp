<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL_ASSET | The Void Protocol</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root { --c: #00ff41; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--c); 
            font-family: 'Courier New', monospace; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        #app { 
            border: 1px solid var(--c); 
            padding: 40px; 
            max-width: 600px; 
            background: rgba(0,0,0,0.9); 
            box-shadow: 0 0 30px rgba(0,255,65,0.3); 
            text-align: center; 
            margin: 20px; 
        }
        h1 { 
            font-size: 2.5em; 
            letter-spacing: 8px; 
            border-bottom: 1px solid var(--c); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
        }
        .manifesto { 
            text-align: left; 
            font-size: 0.9em; 
            line-height: 1.6; 
            border-left: 3px solid var(--c); 
            padding-left: 25px; 
            margin: 30px 0; 
            color: #a0ffa0; 
        }
        input { 
            background: transparent; 
            border: 2px solid var(--c); 
            color: var(--c); 
            padding: 15px; 
            width: 140px; 
            font-size: 1.4em; 
            text-align: center; 
            margin: 20px 10px; 
        }
        button { 
            background: var(--c); 
            color: #000; 
            border: none; 
            padding: 18px 50px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 1.1em; 
            transition: all 0.3s; 
            font-family: inherit; 
            margin-top: 20px; 
        }
        button:hover:not(:disabled) { 
            background: #000; 
            color: var(--c); 
            box-shadow: 0 0 20px var(--c); 
        }
        button:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }
        #status { 
            margin-top: 25px; 
            font-size: 0.85em; 
            min-height: 25px; 
            word-break: break-all; 
        }
        .langs { 
            margin-top: 30px; 
            font-size: 0.8em; 
        }
        .langs span { 
            cursor: pointer; 
            margin: 0 8px; 
            text-decoration: underline; 
            padding: 4px 8px; 
            border-radius: 3px; 
            transition: 0.2s; 
        }
        .langs span:hover { 
            background: rgba(0,255,65,0.1); 
        }
        @keyframes pulse { 
            0%,100%{opacity:.6} 
            50%{opacity:1} 
        }
        .pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <div id="app">
        <h1 id="title">NULL_ASSET</h1>
        
        <div class="manifesto" id="text"></div>
        
        <div>
            <input type="number" id="sol" value="3.69" min="0.1" step="0.01">
            <div style="font-size:1.4em;margin:20px 0">SOL</div>
            <br>
            <button id="burn" onclick="burn()">🔥 INITIATE SACRIFICE</button>
        </div>
        
        <div id="status">System ready...</div>
        
        <div class="langs">
            <span onclick="lang('en')">EN</span>
            <span onclick="lang('ua')">UA</span>
            <span onclick="lang('ru')">RU</span>
            <span onclick="lang('de')">DE</span>
            <span onclick="lang('pl')">PL</span>
        </div>
    </div>

<script>
const ADDR = "5T3ynidN1S4sHGTWF3RQ6NVTFgvMznkVJjZBfvcQPnrC";
const BURN = "11111111111111111111111111111111";

const LANG = {
    en: { t:"NULL_ASSET", b:"🔥 INITIATE SACRIFICE", s:"Connect wallet...", m:"Money is noise. Void is signal. 66.6% BURN FOREVER. 33.3% protocol." },
    ua: { t:"NULL_ASSET", b:"🔥 ПРИНЕСТИ ЖЕРТВУ", s:"Підключіть гаманець...", m:"Гроші — шум. Пустота — сигнал. 66.6% СПАЛЮЄТЬСЯ НАЗАВЖДИ." },
    ru: { t:"NULL_ASSET", b:"🔥 ПРИНЕСТИ ЖЕРТВУ", s:"Подключите кошелек...", m:"Деньги — шум. Пустота — сигнал. 66.6% СЖИГАЕТСЯ НАВСЕГДА." },
    de: { t:"NULL_ASSET", b:"🔥 OPFER BRINGEN", s:"Wallet verbinden...", m:"Geld ist Lärm. Leere ist Signal. 66.6% VERBRENNT FÜR IMMER." },
    pl: { t:"NULL_ASSET", b:"🔥 ZŁÓŻ OFIARĘ", s:"Podłącz portfel...", m:"Pieniądze to hałas. Pustka to sygnał. 66.6% SPALONE NA ZAWSZE." }
};

let currentLang = 'en';

function lang(l) {
    currentLang = l;
    const t = LANG[l];
    document.getElementById('title').textContent = t.t;
    document.getElementById('burn').textContent = t.b;
    document.getElementById('text').textContent = t.m;
    document.getElementById('status').textContent = t.s;
}

function $(id) { return document.getElementById(id); }

async function burn() {
    const status = $('status');
    const btn = $('burn');
    const sol = parseFloat($('sol').value);
    
    if (sol < 0.1) return status.textContent = "❌ MIN 0.1 SOL";
    
    let wallet = window.phantom?.solana || window.solana || window.solflare;
    if (!wallet) return status.textContent = "❌ NO WALLET. Install Phantom";
    
    try {
        btn.disabled = true;
        status.textContent = "🔗 Connecting...";
        status.classList.add('pulse');
        
        await wallet.connect();
        const pubkey = wallet.publicKey.toString();
        
        const conn = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));
        const lamports = Math.floor(sol * solanaWeb3.LAMPORTS_PER_SOL);
        const burnAmt = Math.floor(lamports * 0.666);
        const opAmt = Math.floor(lamports - burnAmt);
        
        const tx = new solanaWeb3.Transaction().add(
            solanaWeb3.SystemProgram.transfer({
                fromPubkey: new solanaWeb3.PublicKey(pubkey),
                toPubkey: new solanaWeb3.PublicKey(BURN),
                lamports: burnAmt
            }),
            solanaWeb3.SystemProgram.transfer({
                fromPubkey: new solanaWeb3.PublicKey(pubkey),
                toPubkey: new solanaWeb3.PublicKey(ADDR),
                lamports: opAmt
            })
        );
        
        status.textContent = "📝 Sign transaction...";
        const { blockhash } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = new solanaWeb3.PublicKey(pubkey);
        
        const { signature } = await wallet.signAndSendTransaction(tx);
        status.textContent = `✅ SACRIFICE COMPLETE: ${signature.slice(0,20)}...`;
        status.classList.remove('pulse');
        btn.disabled = false;
        
        window.open(`https://solscan.io/tx/${signature}`);
        
    } catch(e) {
        status.textContent = `❌ ERROR: ${e.message}`;
        status.classList.remove('pulse');
        btn.disabled = false;
    }
}

// Auto lang
lang(navigator.language.startsWith('uk') ? 'ua' : 
     navigator.language.startsWith('ru') ? 'ru' : 'en');

// Auto wallet check
if (window.solana?.isConnected) $('status').textContent = "✅ Wallet ready";
</script>
</body>
</html>
